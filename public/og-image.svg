<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:0.95" />
    </linearGradient>
  </defs>
  
  <!-- Decorative elements -->
  <circle cx="200" cy="150" r="3" fill="rgba(255,255,255,0.3)"/>
  <circle cx="1000" cy="200" r="2" fill="rgba(255,255,255,0.4)"/>
  <circle cx="150" cy="500" r="4" fill="rgba(255,255,255,0.2)"/>
  <circle cx="1100" cy="450" r="3" fill="rgba(255,255,255,0.3)"/>
  
  <!-- Main icon -->
  <g transform="translate(450, 215)">
    <circle cx="50" cy="50" r="45" fill="url(#iconGradient)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <polygon points="35,25 35,75 75,50" fill="#6366f1" stroke="none"/>
    <circle cx="50" cy="50" r="38" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  </g>
  
  <!-- Title -->
  <text x="600" y="380" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="700" text-anchor="middle" fill="url(#textGradient)">
    瞬剧
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="440" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="400" text-anchor="middle" fill="rgba(255,255,255,0.8)">
    现代化的在线短剧播放平台
  </text>
  
  <!-- Bottom accent line -->
  <rect x="350" y="500" width="500" height="2" fill="url(#textGradient)" opacity="0.6"/>
</svg>