    <script type="module" src="/src/main.tsx" onerror="handleScriptError(event)"></script>
    <script>
      function handleScriptError(event) {
        console.error('Script loading failed:', event);
        document.getElementById('loading-fallback').style.display = 'flex';
        document.getElementById('root').style.display = 'none';
      }

      // Global error handler for module loading failures
      window.addEventListener('error', function(event) {
        if (event.target && (event.target.tagName === 'SCRIPT' || event.target.tagName === 'LINK')) {
          console.error('Resource loading failed:', event.target.src || event.target.href);
          handleScriptError(event);
        }
      });

      // Handle unhandled promise rejections (like dynamic imports)
      window.addEventListener('unhandledrejection', function(event) {
        console.error('Unhandled promise rejection:', event.reason);
        if (event.reason && event.reason.message && event.reason.message.includes('Failed to fetch dynamically imported module')) {
          handleScriptError(event);
        }
      });

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered: ', registration);
            })
            .catch((registrationError) => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
